<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eBay Stamps Arbitrage Finder</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="heroBrand">
          <img
            class="ebayLogo"
            src="https://upload.wikimedia.org/wikipedia/commons/1/1b/EBay_logo.svg"
            alt="eBay"
          />
          <p class="tag">USPS vs eBay Price Intelligence</p>
        </div>
        <h1>eBay Stamps Arbitrage Finder</h1>
        <p class="subtitle">
          Track underpriced USPS stamp listings and surface the fastest resale opportunities.
        </p>
      </section>

      <section class="viewSwitch" aria-label="View mode">
        <button class="viewBtn active" data-view-mode="cards" type="button">Cards</button>
        <button class="viewBtn" data-view-mode="bars" type="button">Bars</button>
        <button class="viewBtn" data-view-mode="list" type="button">List</button>
      </section>

      <section class="controls">
        <label>
          Sort
          <select id="sortBy">
            <option value="best">Best Opportunities</option>
            <option value="discount">Biggest Discount</option>
            <option value="price">Lowest Price</option>
            <option value="trust">Highest Trust</option>
            <option value="recent">Recently Listed</option>
          </select>
        </label>
        <label>
          Stamp Type
          <select id="stampType">
            <option value="all">All</option>
            <option value="domestic">Domestic Forever</option>
            <option value="global">Global Forever</option>
          </select>
        </label>
        <label>
          Condition
          <select id="condition">
            <option value="all">All</option>
            <option value="new">New</option>
            <option value="used">Used</option>
          </select>
        </label>
        <label>
          Minimum Discount %
          <input id="minDiscount" type="number" min="0" step="1" value="0" />
        </label>
        <label>
          Bar Threshold %
          <input id="barThreshold" type="number" min="0" step="1" value="10" />
        </label>
        <label>
          Minimum Trust Score
          <input id="minTrust" type="number" min="0" max="100" step="1" value="0" />
        </label>
        <label>
          Trust Tier
          <select id="trustTier">
            <option value="all">All</option>
            <option value="high">High Trust</option>
            <option value="medium">Medium Trust</option>
            <option value="low">Low Trust</option>
          </select>
        </label>
        <label>
          Query
          <input id="query" type="text" value="usps forever stamps" />
        </label>
        <label class="checkbox">
          <input id="profitableOnly" type="checkbox" checked />
          Profitable Only
        </label>
        <label class="checkbox">
          <input id="useMock" type="checkbox" />
          Allow Mock Fallback
        </label>
        <label class="checkbox">
          <input id="forceEbayRefresh" type="checkbox" />
          Force Live eBay Refresh
        </label>
        <button id="refreshBtn" type="button">Refresh Deals</button>
      </section>

      <section class="quickLook" id="quickLook"></section>

      <section class="stats" id="stats"></section>

      <section class="meta" id="meta"></section>

      <section class="grid" id="listingGrid"></section>
      <section class="barBoard hidden" id="barBoard"></section>
      <section class="listView hidden" id="listView"></section>
    </main>

    <template id="cardTemplate">
      <article class="card">
        <div class="imageWrap">
          <img alt="Stamp Listing" loading="lazy" />
          <span class="dealBadge"></span>
        </div>
        <div class="content">
          <h2 class="title"></h2>
          <div class="itemTopStats">
            <p class="metric metricPerStamp"></p>
            <p class="metric metricTotalBuy"></p>
            <p class="metric metricMultiplier"></p>
          </div>
          <p class="seller"></p>
          <p class="trust"></p>
          <p class="signal"></p>
          <p class="description"></p>
          <p class="pricing"></p>
          <p class="perStamp"></p>
          <p class="arbitrage"></p>
          <p class="metaLine"></p>
          <a class="cta" target="_blank" rel="noopener noreferrer">View Listing</a>
        </div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
